<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WatchParty — شاهد مع أصدقائك</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ───────────── شاشة الدخول ───────────── -->
<div id="screen-join" class="screen active">
  <div class="join-card">
    <div class="join-logo">🎬</div>
    <h1>WatchParty</h1>
    <p class="join-sub">شاهد الأفلام مع أصدقائك بمزامنة تامة</p>

    <label class="field-label">اسمك</label>
    <input type="text" id="inp-username" placeholder="مثال: أحمد" maxlength="20" />

    <div class="join-tabs">
      <button class="tab-btn active" data-tab="create">إنشاء غرفة</button>
      <button class="tab-btn" data-tab="join">انضمام لغرفة</button>
    </div>

    <!-- إنشاء -->
    <div class="tab-panel active" id="panel-create">
      <label class="field-label">رابط الفيديو</label>
      <input type="text" id="inp-video-url" placeholder="رابط MP4 / m3u8 / YouTube" />
      <p class="hint">يدعم: روابط فيديو مباشرة (.mp4 / .m3u8) أو روابط YouTube</p>
      <div class="room-code-box">
        كود الغرفة: <span id="gen-room-code">------</span>
      </div>
      <button class="btn btn-primary" id="btn-create">🎉 أنشئ الغرفة</button>
    </div>

    <!-- انضمام -->
    <div class="tab-panel" id="panel-join">
      <label class="field-label">كود الغرفة</label>
      <input type="text" id="inp-join-code" placeholder="مثال: AB1234" maxlength="6" class="code-input" />
      <button class="btn btn-secondary" id="btn-join">🔗 انضم</button>
    </div>

    <div id="join-error" class="join-error"></div>
  </div>
</div>

<!-- ───────────── شاشة المشاهدة ───────────── -->
<div id="screen-watch" class="screen">
  <div class="watch-layout">

    <!-- منطقة الفيديو -->
    <div class="video-area">
      <div id="player-wrap">
        <video id="html5-video" playsinline></video>
        <div id="yt-player"></div>
      </div>
      <!-- تحكم الجودة (يظهر فقط مع يوتيوب) -->
      <div id="quality-bar" style="display:none">
        <span class="q-label">جودة:</span>
        <select id="quality-select">
          <option value="auto">تلقائي</option>
          <option value="hd2160">4K</option>
          <option value="hd1440">1440p</option>
          <option value="hd1080">1080p</option>
          <option value="hd720">720p</option>
          <option value="large">480p</option>
          <option value="medium">360p</option>
          <option value="small">240p</option>
          <option value="tiny">144p</option>
        </select>
      </div>
    </div>

    <!-- الشريط الجانبي -->
    <aside id="sidebar">
      <div class="sb-header">
        <span class="sb-logo">🎬</span>
        <span class="sb-title">WatchParty</span>
        <span class="sb-room" id="sb-room-code" title="اضغط للنسخ">------</span>
        <button class="sb-icon" id="sb-share" title="نسخ الكود">🔗</button>
        <button class="sb-icon" id="sb-leave" title="مغادرة">🚪</button>
      </div>

      <div class="sb-members" id="sb-members"></div>

      <!-- شريط الصوت -->
      <div class="voice-bar" id="voice-bar">
        <div class="voice-avatars" id="voice-avatars"></div>
        <button class="voice-btn" id="btn-voice" title="دخول الصوت">🎙 صوت</button>
        <button class="voice-mute-btn" id="btn-mute" title="كتم" style="display:none">🔇</button>
      </div>

      <div class="sb-feed" id="sb-feed"></div>

      <div class="sb-emoji-bar" id="sb-emoji-bar"></div>

      <div class="sb-input-row">
        <button class="sb-tool" id="sb-emoji-btn" title="إيموجي">😊</button>
        <input type="text" id="sb-chat-input" placeholder="اكتب رسالة..." maxlength="300" />
        <button class="sb-send" id="sb-send">➤</button>
      </div>
    </aside>

    <!-- زر إظهار/إخفاء الشات (للموبايل) -->
    <button id="sb-toggle" title="الشات">💬</button>
  </div>
</div>

<!-- إشعار عائم -->
<div id="toast"></div>

<!-- عناصر الصوت للـ WebRTC (مخفية) -->
<div id="remote-audios"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<script src="app.js"></script>
</body>
</html>
