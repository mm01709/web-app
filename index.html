<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
  <title>صوصو صوصو</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ───────── شاشة الدخول ───────── -->
<div id="screen-join" class="screen active">
  <div class="bg-glow bg-glow-tr"></div>
  <div class="bg-glow bg-glow-bl"></div>

  <div class="join-wrap">
    <!-- اللوجو -->
    <div class="logo-circle">
      <img src="logo.png" alt="صوصو صوصو" />
    </div>
    <h1 class="app-name">صوصو صوصو</h1>
    <p class="app-sub">شاهد مع أصدقائك في نفس اللحظة</p>

    <!-- حقل الاسم -->
    <div class="field-wrap">
      <span class="field-icon">👤</span>
      <input type="text" id="inp-username" placeholder="اسمك" maxlength="20" autocomplete="off" />
    </div>

    <!-- التبويبات -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="create">إنشاء غرفة</button>
      <button class="tab-btn" data-tab="join">انضمام</button>
    </div>

    <!-- إنشاء غرفة -->
    <div class="tab-panel active" id="panel-create">
      <!-- كود الغرفة -->
      <div class="room-code-preview">
        <span class="room-code-lbl">كود الغرفة</span>
        <span id="gen-room-code" class="room-code-val">------</span>
        <button class="copy-code-btn" id="btn-copy-code" title="نسخ الكود">🔗</button>
      </div>

      <!-- رابط يوتيوب / mp4 -->
      <div class="field-wrap">
        <span class="field-icon">▶</span>
        <input type="text" id="inp-video-url" placeholder="رابط YouTube أو MP4 — اختياري" />
      </div>

      <!-- أو رفع فيديو -->
      <div class="upload-divider"><span>أو</span></div>

      <!-- منطقة الرفع -->
      <div id="upload-zone" class="upload-zone">
        <span class="upload-zone-icon">📁</span>
        <span class="upload-zone-text">اضغط لاختيار فيديو</span>
        <span class="upload-zone-sub">MP4 · MKV · MOV · WEBM</span>
        <input type="file" id="inp-file" accept="video/mp4,video/x-matroska,video/webm,video/quicktime,.mp4,.mkv,.mov,.webm,.avi" style="display:none" />
      </div>

      <!-- حالة الرفع -->
      <div id="upload-status" style="display:none">
        <div class="upload-progress-row">
          <span id="upload-status-text">جاري الرفع...</span>
          <span id="upload-pct">0%</span>
        </div>
        <div class="upload-progress-bar"><div id="upload-progress-fill"></div></div>
        <button class="upload-cancel-btn" id="btn-upload-cancel">إلغاء</button>
      </div>

      <!-- بعد الرفع بنجاح -->
      <div id="upload-done" style="display:none" class="upload-done">
        <span class="upload-done-icon">✅</span>
        <div class="upload-done-info">
          <span class="upload-done-label">تم الرفع بنجاح</span>
          <span id="upload-done-name" class="upload-done-name"></span>
        </div>
        <button class="upload-change-btn" id="btn-upload-change">تغيير</button>
      </div>

      <button class="btn-primary" id="btn-create">
        <span class="btn-icon">🎉</span> ابدأ الغرفة
      </button>
    </div>

    <!-- انضمام -->
    <div class="tab-panel" id="panel-join">
      <input type="text" id="inp-join-code" placeholder="أدخل كود الغرفة" maxlength="8" class="code-input" autocomplete="off" />
      <button class="btn-primary" id="btn-join">
        <span class="btn-icon">🔗</span> انضم الآن
      </button>
    </div>

    <div id="join-error" class="join-error"></div>
  </div>
</div>

<!-- ───────── شاشة المشاهدة ───────── -->
<div id="screen-watch" class="screen">

  <!-- الـ layout الرئيسي: فيديو + شات -->
  <div id="watch-root">

    <!-- ── منطقة الفيديو الكاملة ── -->
    <div id="video-area">
      <div id="player-wrap">
        <video id="html5-video" playsinline></video>
        <div id="yt-player"></div>
        <div id="yt-click-shield"></div>

        <!-- Controls Overlay (زي التطبيق) -->
        <div id="video-overlay">
          <!-- Top bar: كود + إيموجي سريع + أزرار -->
          <div id="ov-top">
            <span id="ov-room-code"></span>
            <div id="ov-emojis"></div>
            <div id="ov-top-btns">
              <button id="fb-chat" title="الشات">💬</button>
              <button id="fb-mute" title="كتم المايك" style="display:none">🎤</button>
              <button id="fb-voice" title="صوت">🎙</button>
              <button id="fb-fullscreen" title="ملء الشاشة">⛶</button>
            </div>
          </div>
          <!-- Center: play/pause + skip -->
          <div id="ov-center">
            <button id="ov-skip-back" title="-10s">⏮10</button>
            <button id="ov-play" title="تشغيل/إيقاف">▶</button>
            <button id="ov-skip-fwd" title="+10s">10⏭</button>
          </div>
          <!-- Bottom: progress + time + fullscreen -->
          <div id="ov-bottom">
            <span id="ov-time">0:00</span>
            <input type="range" id="ov-seek" min="0" max="1000" value="0" step="1" />
            <span id="ov-dur">0:00</span>
            <button id="fb-rotate" title="تدوير">⟳</button>
          </div>
        </div>

        <!-- FABs على اليمين (زي التطبيق) -->
        <div id="fabs">
          <button id="fab-voice" title="صوت">🎙</button>
          <button id="fab-mute" title="كتم" style="display:none">🔇</button>
        </div>
      </div>
    </div>

    <!-- زرار الشات الثابت (خارج video-area عشان مش يتأثر بـ click listener) -->
    <button id="btn-toggle-chat" title="فتح/إغلاق الشات">💬</button>

    <!-- مقبض resize الشات (خارج الـ sidebar) -->
    <div id="sidebar-resizer">
      <button id="resizer-close" title="إغلاق الشات">✕</button>
    </div>

    <!-- ── الشات Panel ── -->
    <div id="sidebar">
      <!-- Header -->
      <div class="sb-header">
        <img src="logo.png" class="sb-logo-img" alt="logo" />
        <span class="sb-title">صوصو صوصو</span>
        <span class="sb-room" id="sb-room-code" title="اضغط للنسخ">------</span>
        <button class="sb-icon-btn" id="sb-media" title="مكتبة الفيديوهات">📂</button>
        <button class="sb-icon-btn" id="sb-share" title="نسخ الكود">🔗</button>
        <button class="sb-icon-btn" id="sb-leave" title="مغادرة">🚪</button>
        <button class="sb-icon-btn" id="sb-close-chat" title="إغلاق">✕</button>
      </div>

      <!-- مكتبة الفيديوهات -->
      <div id="media-panel" style="display:none">
        <div class="media-panel-header">
          <span>📂 مكتبة الفيديوهات</span>
          <button id="media-refresh">↻</button>
          <button id="media-close">✕</button>
        </div>
        <div id="media-list" class="media-list">
          <div class="media-loading">جاري التحميل...</div>
        </div>
      </div>

      <!-- الأعضاء -->
      <div class="sb-members" id="sb-members"></div>

      <!-- الصوت -->
      <div class="voice-bar" id="voice-bar">
        <div class="voice-avatars" id="voice-avatars"></div>
        <button class="voice-btn" id="btn-voice">🎙 صوت</button>
        <button class="voice-mute-btn" id="btn-mute" style="display:none">🎤</button>
      </div>

      <!-- الفيد -->
      <div class="sb-feed" id="sb-feed"></div>

      <!-- إيموجي سريع -->
      <div class="sb-emoji-bar" id="sb-emoji-bar"></div>

      <!-- الإدخال -->
      <div class="sb-input-row">
        <input type="text" id="sb-chat-input" placeholder="اكتب رسالة..." maxlength="300" />
        <button class="sb-send" id="sb-send">➤</button>
      </div>
    </div>

  </div>

  <!-- quality bar (خارج overlay) -->
  <div id="quality-bar" style="display:none">
    <span class="q-label">جودة</span>
    <select id="quality-select">
      <option value="auto">تلقائي</option>
      <option value="hd2160">4K</option>
      <option value="hd1440">1440p</option>
      <option value="hd1080">1080p</option>
      <option value="hd720">720p</option>
      <option value="large">480p</option>
      <option value="medium">360p</option>
      <option value="small">240p</option>
      <option value="tiny">144p</option>
    </select>
  </div>

  <!-- float-bar قديم placeholder -->
  <div id="float-bar" style="display:none"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- صوت WebRTC -->
<div id="remote-audios" style="display:none"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<script src="app.js"></script>
</body>
</html>
